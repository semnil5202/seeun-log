name: Deploy Client

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'apps/client/**'
      - 'packages/config/**'
      - 'packages/tsconfig/**'
      - 'pnpm-lock.yaml'
      - 'infra/**'
      - '.github/workflows/deploy-client.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set environment variables
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "S3_BUCKET=prod-eunminlog-static" >> $GITHUB_ENV
            echo "CLOUDFRONT_DISTRIBUTION_ID=${{ secrets.PROD_CLOUDFRONT_DISTRIBUTION_ID }}" >> $GITHUB_ENV
            echo "PUBLIC_STAGE=production" >> $GITHUB_ENV
            echo "SUPABASE_URL=${{ secrets.PROD_SUPABASE_URL }}" >> $GITHUB_ENV
            echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}" >> $GITHUB_ENV
            echo "CF_FUNCTION_NAME=${{ secrets.PROD_CF_FUNCTION_NAME }}" >> $GITHUB_ENV
          else
            echo "S3_BUCKET=dev-eunminlog-static" >> $GITHUB_ENV
            echo "CLOUDFRONT_DISTRIBUTION_ID=${{ secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }}" >> $GITHUB_ENV
            echo "PUBLIC_STAGE=development" >> $GITHUB_ENV
            echo "SUPABASE_URL=${{ secrets.DEV_SUPABASE_URL }}" >> $GITHUB_ENV
            echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.DEV_SUPABASE_SERVICE_ROLE_KEY }}" >> $GITHUB_ENV
            echo "CF_FUNCTION_NAME=${{ secrets.DEV_CF_FUNCTION_NAME }}" >> $GITHUB_ENV
          fi

      - name: Build client
        run: pnpm --filter @eunminlog/client build
        env:
          PUBLIC_STAGE: ${{ env.PUBLIC_STAGE }}
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Generate redirect mappings
        run: node infra/scripts/generate-redirects.mjs
        env:
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Deploy to S3 (HTML — no-cache)
        run: |
          aws s3 sync apps/client/dist/ s3://${{ env.S3_BUCKET }} \
            --exclude "*" --include "*.html" \
            --cache-control "no-cache" \
            --delete

      - name: Deploy to S3 (static assets — long cache)
        run: |
          aws s3 sync apps/client/dist/ s3://${{ env.S3_BUCKET }} \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      - name: Update CloudFront Function
        run: |
          ETAG=$(aws cloudfront describe-function --name ${{ env.CF_FUNCTION_NAME }} --query 'ETag' --output text)
          aws cloudfront update-function --name ${{ env.CF_FUNCTION_NAME }} \
            --function-config '{"Comment":"viewer-request with redirects","Runtime":"cloudfront-js-2.0"}' \
            --function-code fileb://infra/cf-functions/viewer-request.js --if-match $ETAG
          ETAG=$(aws cloudfront describe-function --name ${{ env.CF_FUNCTION_NAME }} --query 'ETag' --output text)
          aws cloudfront publish-function --name ${{ env.CF_FUNCTION_NAME }} --if-match $ETAG

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
